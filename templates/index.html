<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #111;
            color: #eee;
        }
        table {
            font-size: 14px;
        }
        th {
            position: sticky;
            top: 0;
            background-color: #222;
            z-index: 10;
        }
        .modal-backdrop.show {
            opacity: 0.1 !important;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="text-center mb-4">Trading Dashboard</h2>

    <table class="table table-dark table-striped table-bordered align-middle text-center">
        <thead>
            <tr>
                <th>Spółka</th>
                <th>Cena</th>
                <th>SCS</th>
                <th>15m</th>
                <th>60m</th>
                <th>240m</th>
                <th>Buy Zone</th>
                <th>Entry</th>
                <th>TP</th>
                <th>Sygnał</th>
                <th>Edytuj</th>
            </tr>
        </thead>
        <tbody>
            {% for r in results %}
            <tr>
                <td>{{ r.name }}</td>
                <td>{{ r.price }}</td>
                <td>{{ r.scs }}</td>
                <td>{{ r.m15 }}</td>
                <td>{{ r.m60 }}</td>
                <td>{{ r.m240 }}</td>
                <td>{{ r.buy_zone }}</td>
                <td>{{ r.entry }}</td>
                <td>{{ r.tp }}</td>
                <td>{{ r.signal }}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="openModal('{{ r.name }}')">OHLC</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Modal OHLC -->
<div class="modal fade" id="ohlcModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header">
                <h5 class="modal-title">Edytuj OHLC</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input id="ohlcInput" class="form-control" placeholder="Wpisz wartość...">
            </div>
            <div class="modal-footer">
                <button class="btn btn-success" onclick="saveOHLC()">Zapisz</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
let currentTicker = null;
let currentField = null;

function openModal(ticker) {
    currentTicker = ticker;
    currentField = "ohlc_15m";

    const modal = new bootstrap.Modal(document.getElementById('ohlcModal'), {
        backdrop: 'static',
        keyboard: false
    });

    modal.show();
}

function saveOHLC() {
    const value = document.getElementById("ohlcInput").value;

    fetch("/update", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            ticker: currentTicker,
            field: currentField,
            value: value
        })
    }).then(() => {
        location.reload();
    });
}

// Zapobiega zamykaniu modala przy zmianie karty / minimalizacji
window.addEventListener("visibilitychange", function(e) {
    // nic nie robimy — modal ma pozostać otwarty
});
</script>

</body>
</html>
